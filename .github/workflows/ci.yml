name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Least-privilege token scope. The workflow is read-only on the repo
# (no releases, PR comments, deploys, or packages); the only write surface
# is the actions cache (setup-node npm cache + ramsey/composer-install).
# Applying at the top level so every job inherits it and CodeQL's
# "workflow does not contain permissions" alerts on jobs lint/stan/test
# are satisfied by a single declaration.
permissions:
  contents: read
  actions: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Code Style (Pint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Check code style
        run: vendor/bin/pint --test

  practices:
    name: Eloquent Best Practices
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2

      - name: Install ripgrep
        # The Eloquent practices guardrail uses rg. The default ubuntu-latest
        # image does not always include it, so install it explicitly.
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Check Eloquent best-practices baseline
        run: composer practices

  stan:
    name: Static Analysis (Larastan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Verify Larastan schema is in sync
        # Regenerate the Larastan-compatible schema from the squashed dump
        # and fail if it differs from the committed file. This catches drift
        # after a re-squash (schema:dump --prune) where larastan-schema.sql
        # was not regenerated. Incremental migration files don't need this —
        # Larastan stacks them on top of the squashed baseline automatically.
        run: |
          php scripts/generate-larastan-schema.php
          git diff --exit-code database/schema/larastan-schema.sql

      - name: Verify schema dump is normalized
        # The baseline is loaded by `psql` on fresh databases. pg_dump 17+
        # emits artifacts that prevent a clean load on the postgres:16
        # CI/deploy target: \restrict/\unrestrict meta-commands (random
        # tokens that also churn on every re-squash) and
        # SET transaction_timeout (a PG17+ GUC unrecognized by PG16, which
        # logs an ERROR on every load). This guard fails if a re-squash
        # reintroduces them. See the re-squash runbook in
        # database/schema/README.md.
        run: |
          if grep -nE '^\\(un)?restrict |SET transaction_timeout' database/schema/pgsql-schema.sql; then
            echo "::error::Schema dump contains pg_dump version artifacts that break loading on postgres:16."
            echo "Strip them per the re-squash runbook in database/schema/README.md."
            exit 1
          fi

      - name: Run Larastan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M

  i18n:
    name: Translation Integrity (i18n:check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2

      - name: Install dependencies
        # --no-dev would skip nothing here (no dev-only i18n deps), but
        # locked keeps CI reproducible against composer.lock.
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        # i18n:check bootstraps Laravel to parse lang files; some of them
        # call config() inline (terms.php, privacy.php, impressum.php),
        # which needs a bootstrapped config + app key.
        run: php artisan key:generate

      - name: Check translation parity and integrity
        # Fails CI if Weblate (or a dev) ships a PR with missing/extra
        # keys, duplicate keys, untranslated values, or convention
        # violations across locales. Uses the existing App\Console\Commands\
        # I18nCheckCommand. See lang/CONTRIBUTING_TRANSLATIONS.md → Weblate.
        run: php artisan i18n:check

  test:
    name: Tests (Pest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: roundup_games_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2
          extensions: pdo_pgsql
          # OPcache + JIT in CLI gives a measurable boot/per-test speedup
          # across ~4,700 tests. The JIT buffer is small because each pest
          # worker is short-lived; the win is from opcache itself.
          ini-values: |
            opcache.enable=1
            opcache.enable_cli=1
            opcache.jit=tracing
            opcache.jit_buffer_size=64M
            zend.assertions=-1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          # Node 24 is the current active LTS (until ~April 2028). Vite 8
          # requires ^20.19 || >=22.12, which 24 satisfies. Pinned across
          # CI, Dockerfile, .nvmrc, and package.json engines so every build
          # environment produces byte-equivalent assets.
          node-version: '24'
          cache: 'npm'

      - name: Install PHP dependencies
        uses: ramsey/composer-install@v3
        with:
          # Honor the committed composer.lock for reproducible, deterministic
          # CI installs. 'highest' would resolve fresh on each run and can pull
          # different versions than the lock pins.
          dependency-versions: locked
          # classmap-authoritative is safe because deps are locked: no
          # resolution ambiguity, faster autoloading for the test boot that
          # every pest worker pays.
          composer-options: --classmap-authoritative

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend assets
        # Generates public/build/manifest.json so Blade views rendering @vite()
        # resolve during tests. public/build is gitignored, so without this step
        # any view test throws ViteManifestNotFoundException. Icon subsetting is
        # auto-skipped here (no Python toolchain in CI) — the committed font is
        # used and the Vite manifest is still produced.
        run: npm run build

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run migrations
        env:
          DB_PASSWORD: postgres
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array
        run: php artisan migrate --force

      - name: Run tests
        env:
          DB_PASSWORD: postgres
        # --parallel: pest 4.x ships parallel support in-core
        # (vendor/pestphp/pest/src/Plugins/Parallel.php). tests/bootstrap.php
        # is already wired for it (PARATEST/TEST_TOKEN, primary worker owns
        # the Testcontainers Postgres, siblings reuse it via a cache file).
        # GitHub Actions ubuntu-latest has 4 vCPU — --parallel picks that
        # automatically; --ci keeps the concise PR-friendly output.
        run: vendor/bin/pest --ci --parallel
