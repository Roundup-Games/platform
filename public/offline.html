<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline — Roundup Games</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #fbf9f1; /* surface */
            color: #1e1e1e;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 480px;
        }
        .icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            margin-bottom: 1.25rem;
            color: #835500; /* primary */
        }
        .icon svg {
            width: 100%;
            height: 100%;
            fill: currentColor;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 0.5rem;
            color: #835500; /* primary */
        }
        p {
            color: #555;
            line-height: 1.6;
            margin: 0;
        }
        button {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.75rem 1.5rem;
            background-color: #835500; /* primary */
            color: #fff;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        button:hover { background-color: #6b4500; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon" aria-hidden="true">
            <!-- Material Symbols "cloud_off" as inline SVG for offline reliability -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M19.35 10.04A7.49 7.49 0 0 0 12 4C9.11 4 6.6 5.64 5.35 8.04A5.994 5.994 0 0 0 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM19 18H6c-2.21 0-4-1.79-4-4 0-2.05 1.53-3.76 3.56-3.97l1.07-.11.5-.95A5.469 5.469 0 0 1 12 6c2.62 0 4.88 1.86 5.39 4.43l.3 1.5 1.53.11A2.989 2.989 0 0 1 22 15c0 1.65-1.35 3-3 3zm-5.93-8.48L8 15l1.41 1.41 2.07-2.07L13.59 16 15 14.59l-2.12-2.13 2.13-2.12z"/>
            </svg>
        </div>
        <h1>You're offline</h1>
        <p>Check your connection and try again. Some previously-visited pages may still be available.</p>
        <button onclick="location.reload()">Try again</button>
    </div>
</body>
</html>
